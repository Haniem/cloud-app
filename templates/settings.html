{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card p-4">
            <h1 class="h4 mb-4">Настройки</h1>

            <h6 class="mb-2">Изменить пароль</h6>
            <form method="post" class="mb-4">
                <input type="hidden" name="action" value="password">
                <div class="mb-2">
                    <input type="password" name="current_password" class="form-control form-control-sm" placeholder="Текущий пароль" required>
                </div>
                <div class="mb-2">
                    <input type="password" name="new_password" class="form-control form-control-sm" placeholder="Новый пароль (мин. 4)" required minlength="4">
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Сохранить пароль</button>
            </form>

            <hr>

            <h6 class="mb-2">Изменить email</h6>
            <form method="post">
                <input type="hidden" name="action" value="email">
                <div class="mb-2">
                    <input type="email" name="email" class="form-control form-control-sm" value="{{ user.email }}" required>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Сохранить email</button>
            </form>

            <p class="text-muted small mt-3 mb-0">Логин: {{ user.username }}</p>

            <hr>

            <h6 class="mb-2">Аватар</h6>
            <div class="d-flex align-items-center gap-3 mb-3">
                {% if user.avatar_key %}
                    <img
                        src="{{ url_for('avatar_me') }}"
                        alt="avatar"
                        style="width:64px;height:64px;border-radius:50%;object-fit:cover;background:transparent;border:none;"
                    />
                {% else %}
                    <div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.7);border:1px dashed rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;color:#666;">
                        ?
                    </div>
                {% endif %}
                <div class="text-muted small">
                    Загружаются только изображения.
                </div>
            </div>

            <form method="post" enctype="multipart/form-data" class="mb-2">
                <input type="hidden" name="action" value="avatar">
                <input type="file" name="avatar" class="form-control form-control-sm" accept="image/*" required>
                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary btn-sm">Загрузить</button>
                    <a href="{{ url_for('settings') }}" class="btn btn-outline-secondary btn-sm">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
