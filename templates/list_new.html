{% extends "base.html" %}
{% block title %}Новый список{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h1 class="h4 mb-4">Новый список</h1>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Название списка</label>
                    <input type="text" name="name" class="form-control" placeholder="Например: Продукты на неделю" required autofocus>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Создать</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
