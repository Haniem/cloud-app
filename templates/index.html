<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список покупок — Облачное приложение</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 2rem 0; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .list-group-item { border: none; border-bottom: 1px solid #eee; }
        .list-group-item:last-child { border-bottom: none; }
        .bought { opacity: 0.6; text-decoration: line-through; }
        .btn-check { width: 1.5rem; height: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card p-4">
            <h1 class="h4 mb-4 text-center">🛒 Список покупок</h1>
            <p class="text-muted small text-center mb-3">Облачное приложение • Основы облачных технологий</p>

            <form action="/add" method="post" class="d-flex gap-2 mb-4">
                <input type="text" name="name" class="form-control" placeholder="Что купить?" required autofocus>
                <button type="submit" class="btn btn-primary">Добавить</button>
            </form>

            <ul class="list-group list-group-flush">
                {% for item in items %}
                <li class="list-group-item d-flex align-items-center gap-2 {% if item.bought %}bought{% endif %}">
                    <a href="/toggle/{{ item.id }}" class="text-decoration-none" title="Отметить">
                        {% if item.bought %}✅{% else %}⬜{% endif %}
                    </a>
                    <span class="flex-grow-1">{{ item.name }}</span>
                    <a href="/delete/{{ item.id }}" class="btn btn-sm btn-outline-danger" title="Удалить">×</a>
                </li>
                {% else %}
                <li class="list-group-item text-muted text-center py-4">Список пуст. Добавьте первый товар!</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
